<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style2.css">
  <title>Formulário - Banda perfeita</title>
</head>

<body>
 
  <div>
    <img src="img/detonator.png" alt="Detonator" des=""Detonator, Deus do Metal, posando de maneira valente">
  </div>

  <form method="get">
    <div id="nome">
      <label for="inp-vocal">Nome da banda</label>
      <input type="text" name="nome-banda" id="inp-nomebanda">
    </div>
    <div id="vocal">
      <label for="inp-vocal">Vocalista</label>
      <input type="text" name="vocal-fav" id="inp-vocal">
    </div>
    <div id="guitarA">
      <label for="inp-guitarA">Guitarrista A</label>
      <input type="text" name="guitarA-fav" id="inp-guitarA">
    </div>
    <div id="guitarB">
      <label for="inp-guitarB">Guitarrista B</label>
      <input type="text" name="guitarB-fav" id="inp-guitarB">
    </div>
    <div id="baixo">
      <label for="inp-baixo">Baixista</label>
      <input type="text" name="baixo-fav" id="inp-baixo">
    </div>
    <div id="bateria">
      <label for="inp-batera">Baterista</label>
      <input type="text" name="batera-fav" id="inp-batera">
    </div>
    <button>ENVIAR</button>
  </form>

  <div>
    <img src="img/massacration.png" alt="Gates of Fried Metal Chicken of Death" des="Capa de um álbum do massacration, maior banda da história">
  </div>

</body>

</html>
